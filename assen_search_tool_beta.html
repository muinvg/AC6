<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アセン検索ツール - 開発評価版 (beta)</title>
<style>
:root{
  --bg: #0a0d11;
  --panel-bg: #10151b;
  --panel-bg-alt: #141a21;
  --border: #263140;
  --border-bright: #3a4d61;
  --text: #d6dee6;
  --text-dim: #7d8b9a;
  --accent: #5fd4d0;
  --accent-dim: #2e6b68;
  --warn: #e8a33d;
  --danger: #e8613d;
  --ok: #4fae6f;
  --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  --sans: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
}
*{ box-sizing: border-box; }
html,body{
  margin:0; padding:0; background: var(--bg); color: var(--text);
  font-family: var(--sans); font-size: 13px;
}
body{
  background-image:
    linear-gradient(var(--bg), var(--bg)),
    repeating-linear-gradient(0deg, rgba(95,212,208,0.025) 0px, rgba(95,212,208,0.025) 1px, transparent 1px, transparent 24px),
    repeating-linear-gradient(90deg, rgba(95,212,208,0.025) 0px, rgba(95,212,208,0.025) 1px, transparent 1px, transparent 24px);
}
header{
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
}
header .title{
  font-family: var(--mono); font-size: 17px; letter-spacing: 2px; color: var(--accent);
  text-transform: uppercase;
}
header .subtitle{ font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
header .badge{
  margin-left:auto; font-family: var(--mono); font-size:10px; letter-spacing:1px;
  border:1px solid var(--warn); color: var(--warn); padding:2px 8px; border-radius:2px;
  text-transform:uppercase;
}
.grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: minmax(230px, auto);
  gap: 10px;
  padding: 10px;
}
@media (max-width: 980px){
  .grid{ grid-template-columns: 1fr; }
}
.panel{
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  display:flex; flex-direction:column;
  min-height: 0;
  overflow: hidden;
}
.panel-head{
  padding: 7px 10px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  background: var(--panel-bg-alt);
}
.panel-num{
  font-family: var(--mono); font-size:10px; color: var(--bg); background: var(--accent);
  border-radius:2px; padding: 1px 5px; letter-spacing:1px;
}
.panel-title{ font-size:11.5px; letter-spacing: 1px; color: var(--text); text-transform:uppercase; }
.panel-body{
  padding: 8px 10px; overflow-y:auto; flex:1; min-height:0;
}
.panel-body::-webkit-scrollbar{ width:8px; }
.panel-body::-webkit-scrollbar-thumb{ background: var(--border-bright); border-radius:4px; }

/* Panel1 / Panel4: category select rows */
.cat-row{
  display:grid; grid-template-columns: 34px 1fr; align-items:center; gap:6px;
  padding: 2px 0;
}
.cat-row label{ font-family: var(--mono); font-size:10.5px; color: var(--text-dim); }
select, input[type=number]{
  background: var(--bg); color: var(--text); border:1px solid var(--border);
  border-radius:2px; padding: 3px 5px; font-size: 12px; font-family: var(--sans);
  width:100%;
}
select:disabled, input:disabled{ opacity:0.4; cursor:not-allowed; }
select:focus, input:focus{ outline:1px solid var(--accent); border-color: var(--accent); }
.hint{ font-size:10px; color: var(--text-dim); margin: 2px 0 6px 40px; line-height:1.4; }

/* spec / metric tables */
table.spec-table, table.metric-table{ width:100%; border-collapse:collapse; }
table.spec-table td, table.metric-table td{
  padding: 2px 4px; font-family: var(--mono); font-size: 11.5px;
  border-bottom: 1px dotted var(--border);
}
table.spec-table td:first-child, table.metric-table td:first-child{
  color: var(--text-dim); width: 60%;
}
table.metric-table td:last-child{ text-align:right; color: var(--accent); }
table.metric-table tr.blank td{ border-bottom:none; height:6px; padding:0; }
table.metric-table tr.warn-row td{ color: var(--warn); }
table.metric-table tr.warn-row td.warn-ok{ color: var(--ok); }
.spec-title{ font-family: var(--mono); font-size:12px; color: var(--accent); margin-bottom:4px; }

/* Panel5 filter grid */
table.filter-table{ width:100%; border-collapse:collapse; font-size:11px; }
table.filter-table th{
  text-align:left; color: var(--text-dim); font-weight:normal; font-size:10px;
  border-bottom:1px solid var(--border); padding: 3px 4px; letter-spacing:1px;
}
table.filter-table td{ padding: 2px 4px; font-family: var(--mono); }
table.filter-table td.flabel{ color: var(--text-dim); font-family: var(--sans); }
table.filter-table input{ width: 68px; }
.sort-row{ display:flex; gap:8px; align-items:center; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
.sort-row select{ width:auto; flex:1; }

/* buttons */
button{
  background: var(--panel-bg-alt); color: var(--text); border:1px solid var(--border-bright);
  border-radius:2px; padding: 6px 12px; font-size:12px; cursor:pointer; letter-spacing:0.5px;
}
button:hover:not(:disabled){ border-color: var(--accent); color: var(--accent); }
button:disabled{ opacity:0.35; cursor:not-allowed; }
button.primary{ background: var(--accent-dim); border-color: var(--accent); color: #eafffe; }
button.danger{ border-color: var(--danger); color: var(--danger); }
.btn-row{ display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }

/* panel6 search */
.stat-line{ display:flex; justify-content:space-between; font-family:var(--mono); font-size:11.5px; margin:3px 0; }
.stat-line .v{ color: var(--accent); }
.time-tag{ font-family: var(--mono); padding:1px 6px; border-radius:2px; font-size:10px; letter-spacing:1px; }
.time-tag.short{ background: rgba(79,174,111,0.15); color: var(--ok); border:1px solid var(--ok); }
.time-tag.medium{ background: rgba(232,163,61,0.15); color: var(--warn); border:1px solid var(--warn); }
.time-tag.long{ background: rgba(232,97,61,0.15); color: var(--danger); border:1px solid var(--danger); }
progress{ width:100%; height:14px; accent-color: var(--accent); margin-top:8px; }
.progress-label{ font-family: var(--mono); font-size:10.5px; color: var(--text-dim); margin-top:3px; }
.warn-box{
  border:1px solid var(--danger); color: var(--danger); background: rgba(232,97,61,0.08);
  padding:6px 8px; border-radius:2px; font-size:11px; margin-top:6px;
}

/* panel7 results */
.rank-grid{ display:grid; grid-template-columns: repeat(5, 1fr); gap:5px; }
.rank-btn{ font-family: var(--mono); text-align:center; padding:8px 2px; }
.rank-btn.selected{ border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.rank-btn .rk{ display:block; font-size:14px; }
.rank-btn .val{ display:block; font-size:9px; color: var(--text-dim); margin-top:2px; }
.rank-btn.selected .val{ color: #d7fffd; }
.empty-note{ color: var(--text-dim); font-size:11.5px; padding: 10px 2px; }

.section-note{ font-size:10px; color:var(--text-dim); margin-top:6px; line-height:1.5; }
</style>
</head>

<header>

  <div class="subtitle">DEVELOPMENT EVALUATION BUILD — BRUTE FORCE SEARCH ENGINE</div>
  <div class="badge">beta</div>
</header>

<div class="grid">

  </section>

  <section class="panel">

    <div class="panel-body" id="panel4-body"></div>

  <!-- Panel5: 指標条件設定 -->
  <section class="panel">

    <div class="panel-body" id="panel5-body"></div>
  </section>

  <!-- Panel6: 検索設定 -->
  <section class="panel">
    <div class="panel-head"><span class="panel-num">6</span><span class="panel-title">検索設定</span></div>
    <div class="panel-body" id="panel6-body"></div>
  </section>

  <!-- Panel7: 検索結果 -->
  <section class="panel">
    <div class="panel-head"><span class="panel-num">7</span><span class="panel-title">検索結果</span></div>
    <div class="panel-body" id="panel7-body"></div>
  </section>

  <!-- Panel8: アセン表示2 -->
  <section class="panel">

</div>

  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);

// ===== 共通ユーティリティ =====
function num(v) {
  if (v === undefined || v === null || v === "") return 0;
  if (typeof v === "number") return v;
  const m = /^(-?\d+(\.\d+)?)x(\d+)$/.exec(v);
  if (m) return parseFloat(m[1]) * parseFloat(m[3]);
  const f = parseFloat(v);
  return isNaN(f) ? 0 : f;
}

function b0Func(W) {
  if (W < 40000) return 0.05999484;
  if (W < 62500) return 0.067731837 + (W / 1000) * -0.000196934;
  if (W < 75000) return 0.0777550156 + (W / 1000) * -0.0003576168;
  if (W < 80000) return 0.1183370187 + (W / 1000) * -0.0008988813;
  if (W < 120000) return 0.0613306006 + (W / 1000) * -0.0001865828;
  return 3.900534e-2 + (W / 1000) * 1.183404e-8;
}

}

  if (W < 80000) return 0.0317584063 + (W / 1000) * -0.0001971002;
  if (W < 120000) return 1.995096e-2 + (W / 1000) * -4.977296e-5;
  return 1.399604e-2 + (W / 1000) * 3.62802e-9;
}
function sQBFunc(r) {

const STAT_CATS = ["P5", "P6", "P7", "P8"];

// parts: { P1:{...}, P2:{...}, ..., P7:{...}, P8:{...}, P9: {...}|null, P10:{...}, P11:{...} }

function computeAssen(parts) {
  const legs = parts.P8;
  const core = parts.P6;
  const arms = parts.P7;
  const gen = parts.P11;
  const isTank = legs["脚部タイプ"] === "TANK";
  const booster = isTank ? null : parts.P9;

  const basic = {};
  for (const s of ["AP", "耐弾防御", "耐EN防御", "耐爆防御", "姿勢安定性能"]) {
    basic[s] = STAT_CATS.reduce((acc, c) => acc + num(parts[c][s]), 0);
  }
  const catsPresent = isTank
    ? ["P1", "P2", "P3", "P4", "P5", "P6", "P7", "P8", "P10", "P11"]
    : ["P1", "P2", "P3", "P4", "P5", "P6", "P7", "P8", "P9", "P10", "P11"];
  const W = catsPresent.reduce((acc, c) => acc + num(parts[c]["重量"]), 0);
  const enCats = catsPresent.filter((c) => c !== "P11");
  const enFukaBasic = enCats.reduce((acc, c) => acc + num(parts[c]["EN負荷"]), 0);
  basic["重量"] = W;
  basic["EN負荷"] = enFukaBasic;

  const genKyoukyuuHosei = num(core["ジェネレータ供給補正"]);
  const genShutsuryokuHosei = num(core["ジェネレータ出力補正"]);
  const boosterKouritsuHosei = num(core["ブースタ効率補正"]);

  const enHojuuSeinou = num(gen["EN補充性能"]);
  const kyoukyuuFukugenSeinou = num(gen["供給復元性能"]);
  const enShutsuryoku = num(gen["EN出力"]);
  const enYouryou = num(gen["EN容量"]);
  const fukugenHojuuEN = num(gen["復元時補充EN"]);

  const legsSekisaiJougen = num(legs["積載上限"]);
  const legsWeight = num(legs["重量"]);
  const armsUdebuJougen = num(arms["腕部積載上限"]);
  const shagekiBukiTekisei = num(arms["射撃武器適性"]);

  let qbShouhiEN, qbReloadTime, qbReloadHoshou, suiryoku, qbSuiryoku, abSuiryoku;
  if (isTank) {
    qbShouhiEN = num(legs["QB消費EN"]);
    qbReloadTime = num(legs["QBリロード時間"]);
    qbReloadHoshou = num(legs["QBリロード保証重量"]);
    suiryoku = num(legs["推力"]);
    qbSuiryoku = num(legs["QB推力"]);
    abSuiryoku = num(legs["AB推力"]);
  } else {
    qbShouhiEN = num(booster["QB消費EN"]);
    qbReloadTime = num(booster["QBリロード時間"]);
    qbReloadHoshou = num(booster["QBリロード保証重量"]);
    suiryoku = num(booster["推力"]);
    qbSuiryoku = num(booster["QB推力"]);
    abSuiryoku = num(booster["AB推力"]);
  }

  // (0)(1)
  const enHojuuChien = (1000 / enHojuuSeinou) * (2 - genKyoukyuuHosei / 100);
  const kyoukyuuFukugenChien = (1000 / kyoukyuuFukugenSeinou) * (2 - genKyoukyuuHosei / 100);

  // (2)
  const enFukaGoukei = enFukaBasic;

  // (3)(4)
  const enShutsuryokuJikkou = (enShutsuryoku * genShutsuryokuHosei) / 100;
  const enYojou = enShutsuryokuJikkou - enFukaGoukei;

  // (5)
  let enKyoukyuuKouritsu;
  if (enYojou <= 0) enKyoukyuuKouritsu = 100;
  else if (enYojou <= 1800) enKyoukyuuKouritsu = 1500 + (enYojou * 25) / 6;
  else enKyoukyuuKouritsu = 9000 + ((enYojou - 1800) * 75) / 17;
  if (enKyoukyuuKouritsu >= 16500) enKyoukyuuKouritsu = 16500;

  // (6)
  const qbShouhiENJikkou = qbShouhiEN * (2 - boosterKouritsuHosei / 100);

  // (7)
  const keikoku1 = enYojou <= 0 ? "EN出力不足" : null;

  // (8)
  const sekisaiJuuryou = W - legsWeight;

  // (9)
  const keikoku2 = sekisaiJuuryou > legsSekisaiJougen ? "重量過多" : null;

  // (10)
  const renzokuQB = enYouryou / qbShouhiENJikkou;

  // (11)
  const choukaJuuryou = Math.max(W - qbReloadHoshou, 0);
  let y;
  if (choukaJuuryou <= 0) {
    y = 0;
  } else {
    let a_, b_;
    if (choukaJuuryou < 5000) { a_ = 1; b_ = 0; }
    else if (choukaJuuryou < 10000) { a_ = 4; b_ = -0.1; }
    else if (choukaJuuryou < 30000) { a_ = 8.5; b_ = -0.55; }
    else { a_ = 2.5; b_ = 1.25; }
    y = (a_ * choukaJuuryou) / 100000 + b_;
  }
  const qbReloadJikkou = (1 + y) * qbReloadTime;

  // (12)(13)(14)
  const udebuGoukei = num(parts.P1["重量"]) + num(parts.P2["重量"]);
  const udebuChouka = udebuGoukei - armsUdebuJougen;
  const keikoku3 = udebuChouka > 0 ? "腕部積載超過" : null;

  // (15)
  let anteiKaifuku;
  if (W < 40000) anteiKaifuku = 150;
  else if (W < 80000) anteiKaifuku = 209.5 - (1.5 * W) / 1000;
  else if (W < 110000) anteiKaifuku = 169.1951 - (0.9986 * W) / 1000;
  else if (W < 120000) anteiKaifuku = 59;
  else if (W < 130000) anteiKaifuku = 58;
  else anteiKaifuku = 57;

  // (16)
  const sap = shagekiBukiTekisei;
  let STS;
  if (sap < 50) STS = (sap * 8) / 5;
  else if (sap < 150) STS = 70 + sap * 0.2;
  else STS = 40 + sap * 0.4;
  const x = (udebuGoukei - armsUdebuJougen) / armsUdebuJougen;
  let yy;
  if (x < 0) yy = 1 - x * 0;
  else if (x < 0.2) yy = 1 - x * 2.5;
  else if (x < 0.21) yy = 4.5 - x * 20;
  else yy = 0.3667 - x * 0.3172;
  const shoujunTsuijuu = Math.floor(yy * STS);

  // (17)
  const coefTF = COEF_TF_MAP[legs.part_name] ?? 1;
  const b0 = b0Func(W);
  const r = (W - legsSekisaiJougen - legsWeight) / legsSekisaiJougen;
  const sB = sBoostFunc(r);
  const boostSpeed = sB * suiryoku * coefTF * b0;

  // (18)
  const q0 = q0Func(W);
  const sQ = sQBFunc(r);
  const qbSpeed = sQ * q0 * qbSuiryoku;

  // (19) AB速度
  const a0 = a0Func(W);
  const sA = sABFunc(r);
  const abSpeed = sA * a0 * abSuiryoku;

  // (20)(21)
  const enKanzenKaifukuTsujou = enHojuuChien + enYouryou / enKyoukyuuKouritsu;
  const enKanzenKaifukuFukugen = kyoukyuuFukugenChien + (enYouryou - fukugenHojuuEN) / enKyoukyuuKouritsu;

  const warnings = [keikoku1, keikoku2, keikoku3].filter(Boolean);
  const warningStr = warnings.length ? warnings.join(", ") : "異常なし";

  return {
    AP: basic.AP, 耐弾防御: basic.耐弾防御, 耐EN防御: basic.耐EN防御, 耐爆防御: basic.耐爆防御,
    姿勢安定性能: basic.姿勢安定性能, 安定回復補正: anteiKaifuku,
    照準追従性能: shoujunTsuijuu,
    ブースト速度: boostSpeed, QB速度: qbSpeed,
    QB消費EN実効値: qbShouhiENJikkou, QBリロード時間実効値: qbReloadJikkou,
    EN容量: enYouryou, EN供給効率: enKyoukyuuKouritsu, EN補充遅延: enHojuuChien,
    重量: W, 警告: warningStr,
    腕部積載合計: udebuGoukei, 腕部積載上限: armsUdebuJougen,
    積載重量: sekisaiJuuryou, 積載上限: legsSekisaiJougen,
    EN負荷: basic.EN負荷, EN出力実効値: enShutsuryokuJikkou,
    AB速度: abSpeed, 連続QB回数: renzokuQB,
    EN完全回復時間通常: enKanzenKaifukuTsujou, EN完全回復時間復元: enKanzenKaifukuFukugen,
  };
}

function buildParts(sel) {
  // sel: {P1..P11: partName}. TANKなら sel.P9 は無視される。
  const parts = {};
  for (const cat of ["P1","P2","P3","P4","P5","P6","P7","P8","P10","P11"]) {
    parts[cat] = getPart(cat, sel[cat]);
  }
  if (!isTankLeg(parts.P8)) {
    parts.P9 = getPart("P9", sel.P9);
  }
  return parts;
}

/* 現在のfilterSelから、探索対象の候補（6可変カテゴリ + 固定P1~P4 + P8/P9ペア）を構築 */
function buildDims() {
  const P1v = getPart("P1", filterSel.P1);
  const P2v = getPart("P2", filterSel.P2);
  const P3v = getPart("P3", filterSel.P3);
  const P4v = getPart("P4", filterSel.P4);
  const P5list = filterSel.P5 ? [getPart("P5", filterSel.P5)] : DATA.categories.P5;
  const P6list = filterSel.P6 ? [getPart("P6", filterSel.P6)] : DATA.categories.P6;
  const P7list = filterSel.P7 ? [getPart("P7", filterSel.P7)] : DATA.categories.P7;
  const P10list = filterSel.P10 ? [getPart("P10", filterSel.P10)] : DATA.categories.P10;
  const P11list = filterSel.P11 ? [getPart("P11", filterSel.P11)] : DATA.categories.P11;

  const p8Candidates = filterSel.P8 ? [getPart("P8", filterSel.P8)] : DATA.categories.P8;
  const pairList = [];
  for (const p8 of p8Candidates) {
    if (isTankLeg(p8)) {
      if (!filterSel.P9) pairList.push({ p8, p9: null });
      // P9が特定ブースターに固定されている場合はTANK脚部と矛盾するため候補を生成しない
    } else {
      if (!filterSel.P9) {
        for (const p9 of DATA.categories.P9) pairList.push({ p8, p9 });
      } else {
        pairList.push({ p8, p9: getPart("P9", filterSel.P9) });
      }
    }
  }
  return { P1v, P2v, P3v, P4v, P5list, P6list, P7list, pairList, P10list, P11list };
}

function collectFilters() {
  const out = [];
  for (const k in filterConditions) {
    const c = filterConditions[k];
    if (c.gte !== null && !isNaN(c.gte)) out.push({ k, op: "gte", v: c.gte });
    if (c.lte !== null && !isNaN(c.lte)) out.push({ k, op: "lte", v: c.lte });
  }
  return out;
}

const WORKER_SRC = `

function b0Func(W) {
  if (W < 40000) return 0.05999484;
  if (W < 62500) return 0.067731837 + (W / 1000) * -0.000196934;
  if (W < 75000) return 0.0777550156 + (W / 1000) * -0.0003576168;

  return 0.701306777 + r * -0.003127993;
}
function a0Func(W) {
  if (W < 40000) return 5.979614e-2 + (W / 1000) * 1.86766e-6;
  if (W < 50000) return 0.0719303061 + (W / 1000) * -0.0002999788;

function sABFunc(r) {
  if (r < 0) return 1.0;
  if (r < 0.05) return 1.000413 + r * -1.000329;
  if (r < 0.1) return 1.098517 + r * -2.982728;
  if (r < 0.5) return 0.8242515 + r * -0.2480306;
  return 0.702990462 + r * -0.003880338;
}

const STAT_CATS = ["P5", "P6", "P7", "P8"];

// parts: { P1:{...}, P2:{...}, ..., P7:{...}, P8:{...}, P9: {...}|null, P10:{...}, P11:{...} }
// isTank は parts.P8.脚部タイプ === "TANK" から判定。P9はTANK時null。
function computeAssen(parts) {
  const legs = parts.P8;
  const core = parts.P6;
  const arms = parts.P7;
  const gen = parts.P11;
  const isTank = legs["脚部タイプ"] === "TANK";
  const booster = isTank ? null : parts.P9;

  const basic = {};
  for (const s of ["AP", "耐弾防御", "耐EN防御", "耐爆防御", "姿勢安定性能"]) {
    basic[s] = STAT_CATS.reduce((acc, c) => acc + num(parts[c][s]), 0);
  }
  const catsPresent = isTank
    ? ["P1", "P2", "P3", "P4", "P5", "P6", "P7", "P8", "P10", "P11"]
    : ["P1", "P2", "P3", "P4", "P5", "P6", "P7", "P8", "P9", "P10", "P11"];
  const W = catsPresent.reduce((acc, c) => acc + num(parts[c]["重量"]), 0);
  const enCats = catsPresent.filter((c) => c !== "P11");
  const enFukaBasic = enCats.reduce((acc, c) => acc + num(parts[c]["EN負荷"]), 0);
  basic["重量"] = W;
  basic["EN負荷"] = enFukaBasic;

  const genKyoukyuuHosei = num(core["ジェネレータ供給補正"]);
  const genShutsuryokuHosei = num(core["ジェネレータ出力補正"]);
  const boosterKouritsuHosei = num(core["ブースタ効率補正"]);

  const enHojuuSeinou = num(gen["EN補充性能"]);
  const kyoukyuuFukugenSeinou = num(gen["供給復元性能"]);
  const enShutsuryoku = num(gen["EN出力"]);
  const enYouryou = num(gen["EN容量"]);
  const fukugenHojuuEN = num(gen["復元時補充EN"]);

  const legsSekisaiJougen = num(legs["積載上限"]);
  const legsWeight = num(legs["重量"]);
  const armsUdebuJougen = num(arms["腕部積載上限"]);
  const shagekiBukiTekisei = num(arms["射撃武器適性"]);

  let qbShouhiEN, qbReloadTime, qbReloadHoshou, suiryoku, qbSuiryoku, abSuiryoku;
  if (isTank) {
    qbShouhiEN = num(legs["QB消費EN"]);
    qbReloadTime = num(legs["QBリロード時間"]);
    qbReloadHoshou = num(legs["QBリロード保証重量"]);
    suiryoku = num(legs["推力"]);
    qbSuiryoku = num(legs["QB推力"]);
    abSuiryoku = num(legs["AB推力"]);
  } else {
    qbShouhiEN = num(booster["QB消費EN"]);
    qbReloadTime = num(booster["QBリロード時間"]);
    qbReloadHoshou = num(booster["QBリロード保証重量"]);
    suiryoku = num(booster["推力"]);
    qbSuiryoku = num(booster["QB推力"]);
    abSuiryoku = num(booster["AB推力"]);
  }

  // (0)(1)
  const enHojuuChien = (1000 / enHojuuSeinou) * (2 - genKyoukyuuHosei / 100);
  const kyoukyuuFukugenChien = (1000 / kyoukyuuFukugenSeinou) * (2 - genKyoukyuuHosei / 100);

  // (2)
  const enFukaGoukei = enFukaBasic;

  // (3)(4)
  const enShutsuryokuJikkou = (enShutsuryoku * genShutsuryokuHosei) / 100;
  const enYojou = enShutsuryokuJikkou - enFukaGoukei;

  // (5)
  let enKyoukyuuKouritsu;
  if (enYojou <= 0) enKyoukyuuKouritsu = 100;
  else if (enYojou <= 1800) enKyoukyuuKouritsu = 1500 + (enYojou * 25) / 6;
  else enKyoukyuuKouritsu = 9000 + ((enYojou - 1800) * 75) / 17;
  if (enKyoukyuuKouritsu >= 16500) enKyoukyuuKouritsu = 16500;

  // (6)
  const qbShouhiENJikkou = qbShouhiEN * (2 - boosterKouritsuHosei / 100);

  // (7)
  const keikoku1 = enYojou <= 0 ? "EN出力不足" : null;

  // (8)
  const sekisaiJuuryou = W - legsWeight;

  // (9)
  const keikoku2 = sekisaiJuuryou > legsSekisaiJougen ? "重量過多" : null;

  // (10)
  const renzokuQB = enYouryou / qbShouhiENJikkou;

  // (11)
  const choukaJuuryou = Math.max(W - qbReloadHoshou, 0);
  let y;
  if (choukaJuuryou <= 0) {
    y = 0;
  } else {
    let a_, b_;
    if (choukaJuuryou < 5000) { a_ = 1; b_ = 0; }
    else if (choukaJuuryou < 10000) { a_ = 4; b_ = -0.1; }
    else if (choukaJuuryou < 30000) { a_ = 8.5; b_ = -0.55; }
    else { a_ = 2.5; b_ = 1.25; }
    y = (a_ * choukaJuuryou) / 100000 + b_;
  }
  const qbReloadJikkou = (1 + y) * qbReloadTime;

  // (12)(13)(14)
  const udebuGoukei = num(parts.P1["重量"]) + num(parts.P2["重量"]);
  const udebuChouka = udebuGoukei - armsUdebuJougen;
  const keikoku3 = udebuChouka > 0 ? "腕部積載超過" : null;

  // (15)
  let anteiKaifuku;
  if (W < 40000) anteiKaifuku = 150;
  else if (W < 80000) anteiKaifuku = 209.5 - (1.5 * W) / 1000;
  else if (W < 110000) anteiKaifuku = 169.1951 - (0.9986 * W) / 1000;
  else if (W < 120000) anteiKaifuku = 59;
  else if (W < 130000) anteiKaifuku = 58;
  else anteiKaifuku = 57;

  // (16)
  const sap = shagekiBukiTekisei;
  let STS;
  if (sap < 50) STS = (sap * 8) / 5;
  else if (sap < 150) STS = 70 + sap * 0.2;
  else STS = 40 + sap * 0.4;
  const x = (udebuGoukei - armsUdebuJougen) / armsUdebuJougen;
  let yy;
  if (x < 0) yy = 1 - x * 0;
  else if (x < 0.2) yy = 1 - x * 2.5;
  else if (x < 0.21) yy = 4.5 - x * 20;
  else yy = 0.3667 - x * 0.3172;
  const shoujunTsuijuu = Math.floor(yy * STS);

  // (17)
  const coefTF = COEF_TF_MAP[legs.part_name] ?? 1;
  const b0 = b0Func(W);
  const r = (W - legsSekisaiJougen - legsWeight) / legsSekisaiJougen;
  const sB = sBoostFunc(r);
  const boostSpeed = sB * suiryoku * coefTF * b0;

  // (18)
  const q0 = q0Func(W);
  const sQ = sQBFunc(r);
  const qbSpeed = sQ * q0 * qbSuiryoku;

  // (19) AB速度
  const a0 = a0Func(W);
  const sA = sABFunc(r);
  const abSpeed = sA * a0 * abSuiryoku;

  // (20)(21)
  const enKanzenKaifukuTsujou = enHojuuChien + enYouryou / enKyoukyuuKouritsu;
  const enKanzenKaifukuFukugen = kyoukyuuFukugenChien + (enYouryou - fukugenHojuuEN) / enKyoukyuuKouritsu;

  const warnings = [keikoku1, keikoku2, keikoku3].filter(Boolean);
  const warningStr = warnings.length ? warnings.join(", ") : "異常なし";

  return {
    AP: basic.AP, 耐弾防御: basic.耐弾防御, 耐EN防御: basic.耐EN防御, 耐爆防御: basic.耐爆防御,
    姿勢安定性能: basic.姿勢安定性能, 安定回復補正: anteiKaifuku,
    照準追従性能: shoujunTsuijuu,
    ブースト速度: boostSpeed, QB速度: qbSpeed,
    QB消費EN実効値: qbShouhiENJikkou, QBリロード時間実効値: qbReloadJikkou,
    EN容量: enYouryou, EN供給効率: enKyoukyuuKouritsu, EN補充遅延: enHojuuChien,
    重量: W, 警告: warningStr,
    腕部積載合計: udebuGoukei, 腕部積載上限: armsUdebuJougen,
    積載重量: sekisaiJuuryou, 積載上限: legsSekisaiJougen,
    EN負荷: basic.EN負荷, EN出力実効値: enShutsuryokuJikkou,
    AB速度: abSpeed, 連続QB回数: renzokuQB,
    EN完全回復時間通常: enKanzenKaifukuTsujou, EN完全回復時間復元: enKanzenKaifukuFukugen,
  };
}



self.onmessage = function (e) {
  const d = e.data;
  const { P1v, P2v, P3v, P4v, P5list, P6list, P7list, pairList, P10list, P11list, filters, sortKey, sortDir, total } = d;
  let processed = 0;
  const progressStep = Math.max(1, Math.floor(total / 200));
  const N = 10;
  const top = [];

  function passFilters(res) {
    for (const f of filters) {
      const v = res[f.k];
      if (f.op === "gte" && !(v >= f.v)) return false;
      if (f.op === "lte" && !(v <= f.v)) return false;
    }
    return true;
  }
  function sortTop() {
    top.sort((a, b) => (sortDir === "desc" ? b.metrics[sortKey] - a.metrics[sortKey] : a.metrics[sortKey] - b.metrics[sortKey]));
  }
  function insertTop(entry) {
    if (top.length < N) {
      top.push(entry);
      sortTop();
      return;
    }
    const worst = top[N - 1];
    const isBetter = sortDir === "desc" ? entry.metrics[sortKey] > worst.metrics[sortKey] : entry.metrics[sortKey] < worst.metrics[sortKey];
    if (isBetter) {
      top[N - 1] = entry;
      sortTop();
    }
  }

  for (const p5 of P5list) {
    for (const p6 of P6list) {
      for (const p7 of P7list) {
        for (const pair of pairList) {
          for (const p10 of P10list) {
            for (const p11 of P11list) {
              processed++;
              const parts = { P1: P1v, P2: P2v, P3: P3v, P4: P4v, P5: p5, P6: p6, P7: p7, P8: pair.p8, P10: p10, P11: p11 };
              if (pair.p9) parts.P9 = pair.p9;
              const metrics = computeAssen(parts);
              if (passFilters(metrics)) {
                insertTop({
                  sel: {
                    P1: P1v.part_name, P2: P2v.part_name, P3: P3v.part_name, P4: P4v.part_name,
                    P5: p5.part_name, P6: p6.part_name, P7: p7.part_name, P8: pair.p8.part_name,
                    P9: pair.p9 ? pair.p9.part_name : null,
                    P10: p10.part_name, P11: p11.part_name,
                  },
                  metrics,
                });
              }
              if (processed % progressStep === 0) {
                self.postMessage({ type: "progress", processed, total });
              }
            }
          }
        }
      }
    }
  }
  self.postMessage({ type: "done", processed, total, results: top });
};
`;

function startSearch() {
  const dims = buildDims();
  const total = estimateTotal(dims);
  if (total === 0) return;

  document.getElementById("p6-start").disabled = true;
  document.getElementById("p6-cancel").disabled = false;
  document.getElementById("p6-progress").value = 0;
  document.getElementById("p6-progress-label").textContent = "検索中... 0%";

  document.getElementById("panel7-body").innerHTML = '<div class="empty-note">検索中です…</div>';
  document.getElementById("panel8-body").innerHTML = "";
  document.getElementById("panel9-body").innerHTML = "";
  searchResults = [];

  const blob = new Blob([WORKER_SRC], { type: "application/javascript" });
  const url = URL.createObjectURL(blob);
  currentWorker = new Worker(url);

  currentWorker.onmessage = (e) => {
    const msg = e.data;
    if (msg.type === "progress") {
      const pct = Math.min(100, Math.round((msg.processed / msg.total) * 100));
      document.getElementById("p6-progress").value = pct;
      document.getElementById("p6-progress-label").textContent =
        "検索中... " + pct + "% (" + msg.processed.toLocaleString("ja-JP") + " / " + msg.total.toLocaleString("ja-JP") + ")";
    } else if (msg.type === "done") {
      document.getElementById("p6-progress").value = 100;
      document.getElementById("p6-progress-label").textContent =
        "完了 (" + msg.processed.toLocaleString("ja-JP") + " 件評価 / 該当 " + msg.results.length + " 件表示)";
      document.getElementById("p6-start").disabled = false;
      document.getElementById("p6-cancel").disabled = true;
      searchResults = msg.results;
      renderPanel7();
      URL.revokeObjectURL(url);
      currentWorker = null;
    }
  };

  currentWorker.postMessage({
    P1v: dims.P1v, P2v: dims.P2v, P3v: dims.P3v, P4v: dims.P4v,
    P5list: dims.P5list, P6list: dims.P6list, P7list: dims.P7list,
    pairList: dims.pairList, P10list: dims.P10list, P11list: dims.P11list,
    filters: collectFilters(), sortKey, sortDir, total,
  });
}

function cancelSearch() {
  if (currentWorker) {
    currentWorker.terminate();
    currentWorker = null;
  }
  document.getElementById("p6-start").disabled = false;
  document.getElementById("p6-cancel").disabled = true;
  document.getElementById("p6-progress-label").textContent = "中止しました";
  document.getElementById("panel7-body").innerHTML = '<div class="empty-note">検索が中止されました。</div>';
}

/* =========================================================================
   Panel 7: 検索結果 / Panel 8: アセン表示2 / Panel 9: 指標表示2
   ========================================================================= */
let selectedRank = null;

function renderPanel7() {
  const body = document.getElementById("panel7-body");
  if (!searchResults.length) {
    body.innerHTML = '<div class="empty-note">条件に該当するアセンが見つかりませんでした。</div>';
    return;
  }
  let html = '<div class="rank-grid">';
  searchResults.forEach((r, i) => {
    html +=
      '<button class="rank-btn" data-rank="' + i + '"><span class="rk">' + (i + 1) + "位</span>" +
      '<span class="val">' + fmtNum(r.metrics[sortKey]) + "</span></button>";
  });
  html += "</div>";
  if (searchResults.length < 10) {
    html += '<div class="section-note">該当件数が10件未満のため、' + searchResults.length + "件のみ表示しています。</div>";
  }
  body.innerHTML = html;
  body.querySelectorAll(".rank-btn").forEach((btn) => {
    btn.addEventListener("click", () => selectRank(parseInt(btn.dataset.rank, 10)));
  });
  selectRank(0);
}

function selectRank(i) {
  selectedRank = i;
  document.querySelectorAll(".rank-btn").forEach((b) => b.classList.toggle("selected", parseInt(b.dataset.rank, 10) === i));
  const r = searchResults[i];
  renderPanel8(r);
  renderPanel9(r);
}

function renderPanel8(r) {
  const body = document.getElementById("panel8-body");
  let html = '<table class="spec-table">';
  for (const cat of CATS) {
    const name = r.sel[cat];
    html += "<tr><td>" + cat + " (" + DATA.labels[cat] + ")</td><td>" + (name ? name : "（非搭載）") + "</td></tr>";
  }
  html += "</table>";
  body.innerHTML = html;
}

function renderPanel9(r) {
  document.getElementById("panel9-body").innerHTML = renderMetricTable(r.metrics);
}

/* ---------- 初期化 ---------- */
renderPanel1();
renderPanel2();
renderPanel3();
renderPanel4();
renderPanel5();
renderPanel6();
document.getElementById("panel7-body").innerHTML = '<div class="empty-note">まだ検索していません。パネル4・5で条件を設定し、パネル6の「検索開始」を押してください。</div>';

</script>
