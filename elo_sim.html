<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Eloレーティング シミュレーション</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:system-ui, -apple-system, "Hiragino Kaku Gothic ProN","メイリオ",sans-serif;max-width:900px;margin:28px auto;padding:18px;color:#111;}
    h1{font-size:1.4rem;margin-bottom:6px;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
    label{display:block;font-weight:600;margin-bottom:6px;}
    input[type="number"], input[type="text"], select{width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;}
    .card{border:1px solid #e6e6e6;padding:14px;border-radius:10px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,0.03);}
    .controls{display:flex;gap:8px;margin-top:12px;}
    button{background:#0066cc;color:#fff;border:none;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:600;}
    button.secondary{background:#f0f0f0;color:#111;border:1px solid #ddd;}
    .result{margin-top:16px;padding:12px;border-radius:8px;background:#f9faff;border:1px solid #e0ecff;}
    .delta{font-weight:700;}
    .positive{color:#0a8a3a;}
    .negative{color:#c0392b;}
    .small{font-size:0.9rem;color:#555;margin-top:8px;}
    @media(max-width:640px){ .grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <h1>Eloレーティング シミュレーション</h1>
  <p class="small">プレイヤーの現在レートと勝敗、更新係数 K を入力して、レートの増減を計算します。計算式は標準的な Elo（期待勝率 = 1 / (1 + 10^{(R_opponent - R_player)/400})）を使用します。</p>

  <div class="card">
    <div class="grid">
      <div>
        <label for="r1">プレイヤー1 レート</label>
        <input id="r1" type="number" value="1500" min="0" step="1" />
      </div>
      <div>
        <label for="r2">プレイヤー2 レート</label>
        <input id="r2" type="number" value="1500" min="0" step="1" />
      </div>

      <div>
        <label>勝敗（勝者を選択）</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <label style="font-weight:500;"><input type="radio" name="winner" value="1" checked /> プレイヤー1が勝ち</label>
          <label style="font-weight:500;"><input type="radio" name="winner" value="2" /> プレイヤー2が勝ち</label>
          <label style="font-weight:500;"><input type="radio" name="winner" value="draw" /> 引き分け</label>
        </div>
      </div>

      <div>
        <label for="k">更新係数 K</label>
        <input id="k" type="number" value="32" min="1" step="1" />
      </div>
    </div>

    <div class="controls">
      <button id="calcBtn">計算する</button>
      <button id="swapBtn" class="secondary">プレイヤー入れ替え</button>
      <button id="resetBtn" class="secondary">リセット</button>
    </div>

    <div id="output" class="result" aria-live="polite" style="display:none;"></div>
    <div id="notes" class="small">
      <p><strong>表示項目</strong>：プレイヤー1のレート増減、プレイヤー1/2の新レート、期待勝率（小数4桁）</p>
    </div>
  </div>

  <script>
    // Elo計算関数
    function expectedScore(rA, rB){
      return 1 / (1 + Math.pow(10, (rB - rA) / 400));
    }

    function roundTo(n, digits=2){
      const p = Math.pow(10, digits);
      return Math.round(n * p) / p;
    }

    function calcElo(r1, r2, result, K){
      // result: '1' => player1 win, '2' => player2 win, 'draw' => draw
      const e1 = expectedScore(r1, r2);
      const e2 = expectedScore(r2, r1);
      let s1, s2;
      if(result === '1'){ s1 = 1; s2 = 0; }
      else if(result === '2'){ s1 = 0; s2 = 1; }
      else { s1 = 0.5; s2 = 0.5; }

      const delta1 = K * (s1 - e1);
      const delta2 = K * (s2 - e2);
      const newR1 = r1 + delta1;
      const newR2 = r2 + delta2;
      return {
        expected1: e1,
        expected2: e2,
        delta1: delta1,
        delta2: delta2,
        newR1: newR1,
        newR2: newR2
      };
    }

    // DOM
    const r1Input = document.getElementById('r1');
    const r2Input = document.getElementById('r2');
    const kInput = document.getElementById('k');
    const calcBtn = document.getElementById('calcBtn');
    const output = document.getElementById('output');
    const swapBtn = document.getElementById('swapBtn');
    const resetBtn = document.getElementById('resetBtn');

    function getWinner(){
      const radios = document.getElementsByName('winner');
      for(const r of radios) if(r.checked) return r.value;
      return '1';
    }

    function showResult(res){
      output.style.display = 'block';
      const delta1 = res.delta1;
      const delta2 = res.delta2;
      const sign1 = delta1 >= 0 ? '+' : '';
      const sign2 = delta2 >= 0 ? '+' : '';
      const delta1Class = delta1 > 0 ? 'positive' : (delta1 < 0 ? 'negative' : '');
      const delta2Class = delta2 > 0 ? 'positive' : (delta2 < 0 ? 'negative' : '');

      output.innerHTML = `
        <div><strong>プレイヤー1の期待勝率</strong>：${roundTo(res.expected1,4)}</div>
        <div style="margin-top:8px;"><strong>プレイヤー1のレート変化</strong>：<span class="delta ${delta1Class}">${sign1}${roundTo(delta1,2)}</span></div>
        <div style="margin-top:6px;"><strong>プレイヤー1 新レート</strong>：${roundTo(res.newR1,2)}</div>
        <hr style="margin:12px 0;border:none;border-top:1px dashed #e6e6e6;" />
        <div><strong>プレイヤー2の期待勝率</strong>：${roundTo(res.expected2,4)}</div>
        <div style="margin-top:8px;"><strong>プレイヤー2のレート変化</strong>：<span class="delta ${delta2Class}">${sign2}${roundTo(delta2,2)}</span></div>
        <div style="margin-top:6px;"><strong>プレイヤー2 新レート</strong>：${roundTo(res.newR2,2)}</div>
      `;
    }

    calcBtn.addEventListener('click', ()=>{
      const r1 = Number(r1Input.value);
      const r2 = Number(r2Input.value);
      const K = Number(kInput.value);
      const winner = getWinner();

      // バリデーション
      if(Number.isNaN(r1) || Number.isNaN(r2) || Number.isNaN(K)){
        output.style.display = 'block';
        output.innerHTML = '<span style="color:#c0392b;font-weight:700;">
